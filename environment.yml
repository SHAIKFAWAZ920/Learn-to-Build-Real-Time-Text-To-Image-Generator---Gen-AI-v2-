      - fastapi>=0.95.0
      - uvicorn[standard]>=0.22.0
      - gradio>=3.35.0
      - reportlab>=3.6.0
      - jinja2>=3.1.0
      - pytest>=7.0
      - black>=22.0
      - flake8>=5.0
      - mypy>=1.0
